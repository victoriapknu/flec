<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>2026-1 Grade Viewer</title>

  <style>
    /*
      2026-1 Grade Viewer
      ------------------------------------------------------------
      This front-end intentionally keeps Josh's older working
      retrieval pattern:
        - login uses a plain GET request
        - login does not send action=login
        - password changes use a simple POST with URLSearchParams
        - no custom request headers are used

      That avoids CORS preflight behavior and matches the previous
      viewer that already worked from GitHub Pages.
    */

    :root {
      --font-main: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --radius: 16px;
      --speed: 220ms;
    }

    [data-theme="light"] {
      --bg: #f6f9fc;
      --page-bg: radial-gradient(circle at top, #e0f7ff 0, #f8fafc 46rem);
      --surface: #ffffff;
      --surface-soft: #edf7fb;
      --text: #0f172a;
      --muted: #52667a;
      --accent: #0891b2;
      --accent-strong: #0e7490;
      --line: #cfdee8;
      --shadow: 0 14px 34px rgba(15, 23, 42, 0.12);
      --input-bg: #ffffff;
      --input-border: #9bd5e8;
      --button-text: #ffffff;
      --good-bg: #dcfce7;
      --good-text: #166534;
      --warn-bg: #ffedd5;
      --warn-text: #9a3412;
      --bad-bg: #fee2e2;
      --bad-text: #991b1b;
      --neutral-bg: #e0f2fe;
      --neutral-text: #075985;
    }

    [data-theme="dark"] {
      --bg: #07111f;
      --page-bg: radial-gradient(circle at top, #16243a 0, #07111f 45rem);
      --surface: #111c2e;
      --surface-soft: #16243a;
      --text: #e2e8f0;
      --muted: #9fb0c4;
      --accent: #22d3ee;
      --accent-strong: #67e8f9;
      --line: #26384f;
      --shadow: 0 18px 42px rgba(0, 0, 0, 0.34);
      --input-bg: #07111f;
      --input-border: #1c5d72;
      --button-text: #04212b;
      --good-bg: #14532d;
      --good-text: #bbf7d0;
      --warn-bg: #7c2d12;
      --warn-text: #fed7aa;
      --bad-bg: #7f1d1d;
      --bad-text: #fecaca;
      --neutral-bg: #155e75;
      --neutral-text: #a5f3fc;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      padding: 2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-main);
      background: var(--page-bg);
      color: var(--text);
      transition: background var(--speed), color var(--speed);
    }

    button,
    input,
    select {
      width: 100%;
      padding: 0.6rem 0.8rem;
      border-radius: var(--radius);
      border: 1px solid var(--input-border);
      background: var(--input-bg);
      color: var(--text);
      font: inherit;
      transition: border var(--speed), background var(--speed), color var(--speed);
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 22%, transparent);
    }

    button {
      margin-top: 1rem;
      border: none;
      background: var(--accent);
      color: var(--button-text);
      font-weight: 700;
      cursor: pointer;
    }

    button:hover {
      background: var(--text);
      color: var(--bg);
    }

    label {
      display: block;
      margin: 0.95rem 0 0.3rem;
      font-weight: 600;
    }

    h1,
    h2,
    h3 {
      margin-bottom: 0.75rem;
      line-height: 1.2;
    }

    h1 {
      text-align: center;
      color: var(--accent);
      font-size: 1.8rem;
    }

    h2 {
      font-size: 1.45rem;
    }

    h3 {
      margin-top: 1.2rem;
      font-size: 1.1rem;
    }

    hr {
      margin: 1.2rem 0;
      border: none;
      border-top: 1px solid var(--line);
    }

    .card {
      width: min(100%, 56rem);
      padding: 2rem 2.4rem;
      border: 3px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .theme-toggle {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 20;
    }

    .theme-toggle button {
      width: auto;
      margin: 0;
      padding: 0.45rem 0.8rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface);
      color: var(--text);
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.12);
      font-size: 0.9rem;
    }

    .theme-toggle button:hover {
      background: var(--surface-soft);
      color: var(--accent);
    }

    .error {
      margin-top: 0.75rem;
      color: #fb7185;
      text-align: center;
      line-height: 1.4;
    }

    .helper-text {
      margin-top: 0.8rem;
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
      line-height: 1.4;
    }

    .student-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 0.8rem;
    }

    .student-meta {
      color: var(--muted);
      line-height: 1.45;
    }

    .password-link,
    .back-link {
      width: auto;
      margin: 0;
      padding: 0.25rem 0.1rem;
      border: none;
      background: transparent;
      color: var(--muted);
      text-decoration: underline;
      text-underline-offset: 3px;
      font-size: 0.88rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .password-link:hover,
    .back-link:hover {
      background: transparent;
      color: var(--accent);
    }

    .grade-hero {
      margin: 1rem 0;
      padding: 1rem;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 1rem;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-soft);
    }

    .grade-hero-label {
      color: var(--muted);
      font-weight: 700;
      font-size: 0.9rem;
    }

    .grade-hero-score {
      margin-top: 0.15rem;
      font-size: 2.2rem;
      font-weight: 850;
      color: var(--accent);
      line-height: 1.1;
    }

    .grade-hero-sub {
      margin-top: 0.3rem;
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.35;
    }

    .grade-hero-letter {
      font-size: 3rem;
      font-weight: 900;
      line-height: 1;
      text-align: right;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 0.7rem;
      margin: 1rem 0 1.2rem;
    }

    .summary-card {
      min-height: 5.8rem;
      padding: 0.8rem 0.7rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-soft);
    }

    .summary-label {
      margin-bottom: 0.25rem;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
    }

    .summary-main {
      color: var(--text);
      font-size: 1.35rem;
      font-weight: 850;
      line-height: 1.15;
    }

    .summary-sub {
      margin-top: 0.2rem;
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.25;
    }

    .summary-card.good {
      border-color: color-mix(in srgb, var(--good-text) 45%, var(--line));
    }

    .summary-card.good .summary-main {
      color: var(--good-text);
    }

    .summary-card.warn {
      border-color: color-mix(in srgb, var(--warn-text) 45%, var(--line));
    }

    .summary-card.warn .summary-main {
      color: var(--warn-text);
    }

    .summary-card.bad {
      border-color: color-mix(in srgb, var(--bad-text) 45%, var(--line));
    }

    .summary-card.bad .summary-main {
      color: var(--bad-text);
    }

    .grade-section {
      margin-top: 0.9rem;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: color-mix(in srgb, var(--surface) 88%, var(--surface-soft));
      overflow: hidden;
    }

    .grade-section summary {
      padding: 0.85rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      color: var(--text);
      font-weight: 800;
      cursor: pointer;
      list-style: none;
    }

    .grade-section summary::-webkit-details-marker {
      display: none;
    }

    .grade-section summary::after {
      content: "▾";
      color: var(--accent);
      transition: transform var(--speed);
    }

    .grade-section[open] summary {
      border-bottom: 1px solid var(--line);
    }

    .section-count {
      margin-left: auto;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
      background: var(--surface-soft);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 0.1rem 0.5rem;
    }

    .section-body {
      padding: 0.9rem 1rem 1rem;
    }

    .grade-list {
      list-style: none;
      display: grid;
      gap: 0.45rem;
    }

    .grade-item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 0.8rem;
      align-items: center;
      color: var(--muted);
      line-height: 1.35;
    }

    .grade-label {
      min-width: 0;
    }

    .grade-score {
      min-width: 5.4rem;
      padding: 0.22rem 0.55rem;
      border: 1px solid color-mix(in srgb, var(--accent) 40%, var(--line));
      border-radius: 999px;
      background: var(--neutral-bg);
      color: var(--neutral-text);
      text-align: center;
      font-weight: 850;
      white-space: nowrap;
    }

    .attendance-note {
      color: var(--muted);
      line-height: 1.45;
    }

    .absence-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.65rem;
    }

    .absence-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.25rem 0.65rem;
      border: 1px solid color-mix(in srgb, var(--bad-text) 45%, var(--line));
      border-radius: 999px;
      background: var(--bad-bg);
      color: var(--bad-text);
      font-size: 0.9rem;
      font-weight: 800;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 40;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(2px);
    }

    .password-card {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 50;
      margin: auto;
      max-width: 28rem;
      height: max-content;
    }

    @media (max-width: 820px) {
      .summary-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      body {
        align-items: flex-start;
        padding: 5.5rem 1rem 1rem;
      }

      .card {
        padding: 1.35rem;
      }

      .student-header,
      .grade-hero {
        align-items: stretch;
        grid-template-columns: 1fr;
        flex-direction: column;
      }

      .grade-hero-letter {
        text-align: left;
      }

      .summary-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .grade-item {
        grid-template-columns: 1fr;
        gap: 0.25rem;
      }

      .grade-score {
        justify-self: start;
      }
    }
  </style>
</head>

<body>
  <!-- Theme switcher. The selected theme is saved in localStorage. -->
  <div class="theme-toggle">
    <button id="themeToggle" type="button" aria-label="Switch theme">☀ Light mode</button>
  </div>

  <!-- Login card. Class values must match the 3-digit class tab names in the spreadsheet. -->
  <section id="login" class="card">
    <h1>2026-1 Grade Viewer</h1>

    <form id="loginForm">
      <label for="classSelect">Class</label>
      <select id="classSelect" required>
        <option value="" disabled selected>Choose your class…</option>
        <option value="111">111</option>
        <option value="112">112</option>
        <option value="117">117</option>
        <option value="125">125</option>
        <option value="130">130</option>
        <option value="132">132</option>
      </select>

      <label for="studentId">Student ID</label>
      <input id="studentId" autocomplete="username" inputmode="numeric" required>

      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password" required>

      <button type="submit">View Grades</button>
    </form>

    <p id="loginError" class="error"></p>
    <p class="helper-text">Example test login: class 111, ID 202612584, password test.</p>
  </section>

  <!-- Grade output card. JavaScript replaces this section after successful login. -->
  <section id="grades" class="card" style="display: none;"></section>

  <!-- Password change dialog. It uses POST, matching Josh's previous working pattern. -->
  <div id="overlay" class="modal-overlay"></div>

  <section id="passwordCard" class="card password-card">
    <h2>Change Password</h2>

    <form id="passwordForm">
      <label for="oldPassword">Current Password</label>
      <input id="oldPassword" type="password" autocomplete="current-password" required>

      <label for="newPassword">New Password</label>
      <input id="newPassword" type="password" autocomplete="new-password" required>

      <label for="newPasswordConfirm">Confirm New Password</label>
      <input id="newPasswordConfirm" type="password" autocomplete="new-password" required>

      <button type="submit">Save</button>
      <button id="cancelPassword" type="button" style="margin-top: 0.5rem; background: var(--surface); color: var(--text);">
        Cancel
      </button>
    </form>

    <p id="passwordMessage" class="error"></p>
  </section>

  <script>
    /* ───────────────────────── CONFIG ───────────────────────── */

    //  deployed Apps Script Web App URL.
    // Replace this only if Google gives you a different deployment URL.
    const GAS_ENDPOINT = 'https://script.google.com/macros/s/AKfycbxqnzmF2pV-Fiz4UcB4tH6tuwzB2WYRaYui_iU9NoOSGXXiVZaS2_A_Oj-kh3jEoe4N/exec';

    // Small DOM helper.
    const $ = (id) => document.getElementById(id);

    // The active login is kept only in memory for password changes.
    let loginState = null;

    /* ───────────────────────── THEME HANDLING ───────────────────────── */

    const THEME_KEY = 'grade-viewer-theme';

    function applyTheme(theme) {
      const safeTheme = theme === 'light' ? 'light' : 'dark';
      const button = $('themeToggle');

      document.documentElement.setAttribute('data-theme', safeTheme);

      if (button) {
        button.textContent = safeTheme === 'dark' ? '☀ Light mode' : '🌙 Dark mode';
        button.setAttribute(
          'aria-label',
          safeTheme === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'
        );
      }
    }

    applyTheme(localStorage.getItem(THEME_KEY) || 'dark');

    $('themeToggle').addEventListener('click', () => {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';

      localStorage.setItem(THEME_KEY, next);
      applyTheme(next);
    });

    /* ───────────────────────── BASIC FORMATTERS ───────────────────────── */

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, (character) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[character]));
    }

    function hasValue(value) {
      return value !== undefined && value !== null && String(value).trim() !== '';
    }

    function toNumberOrNull(value) {
      if (!hasValue(value)) return null;

      const number = Number(String(value).replace('%', '').trim());
      return Number.isFinite(number) ? number : null;
    }

    function formatNumber(value, digits = 1) {
      const number = toNumberOrNull(value);

      if (number === null) return hasValue(value) ? String(value) : '—';
      return Number.isInteger(number) ? String(number) : number.toFixed(digits).replace(/\.0$/, '');
    }

    function formatPercent(value) {
      const number = toNumberOrNull(value);

      if (number === null) return '—';
      return `${number.toFixed(1)}%`;
    }

    function formatScore(value) {
      return hasValue(value) ? escapeHtml(formatNumber(value, 2)) : '—';
    }

    function formatScoreWithMax(score, max, displayMode = 'scoreWithMax') {
      if (displayMode === 'whole' || !hasValue(max)) {
        return formatScore(score);
      }

      const leftSide = hasValue(score) ? formatNumber(score, 2) : '';
      return `${escapeHtml(leftSide)} / ${escapeHtml(formatNumber(max, 2))}`;
    }

    function formatDashboardFraction(score, max) {
      if (!hasValue(max) || Number(max) === 0) {
        return 'Not active';
      }

      return `${formatScore(score)} / ${escapeHtml(formatNumber(max, 2))}`;
    }

    function gradeColor(letter) {
      const normalized = String(letter || '').trim().toUpperCase();

      if (normalized === 'A+') return '#22c55e';
      if (normalized === 'A') return '#84cc16';
      if (normalized === 'B+') return '#06b6d4';
      if (normalized === 'B') return '#38bdf8';
      if (normalized === 'C+') return '#f59e0b';
      if (normalized === 'C') return '#fb923c';
      if (normalized.startsWith('D')) return '#f97316';
      if (normalized === 'F') return '#ef4444';

      return 'var(--accent)';
    }

    function cardClassForPercent(percent) {
      const number = toNumberOrNull(percent);

      if (number === null) return '';
      if (number >= 80) return 'good';
      if (number >= 70) return 'warn';
      return 'bad';
    }

    /* ───────────────────────── NETWORK HELPERS ───────────────────────── */

    async function requestJson(url, options = {}) {
      let response;

      try {
        response = await fetch(url, options);
      } catch (error) {
        throw new Error(
          'Request blocked or failed. First test the Apps Script URL directly with ?action=ping. ' +
          'If ping works, hard-refresh this page and check that the endpoint URL is .'
        );
      }

      const text = await response.text();
      let json;

      try {
        json = JSON.parse(text);
      } catch (error) {
        throw new Error(
          'The server did not return JSON. This usually means the Apps Script deployment is stale, unauthorized, or returning a Google error page.'
        );
      }

      if (json.status !== 'ok') {
        throw new Error(json.message || 'Unknown Apps Script error.');
      }

      return json.data;
    }

    async function login(classCode, studentId, password) {
      // Critical: this intentionally does NOT send action=login.
      // It matches Josh's older working viewer request shape.
      const params = new URLSearchParams({
        class: classCode,
        id: studentId,
        pw: password
      });

      return requestJson(`${GAS_ENDPOINT}?${params.toString()}`);
    }

    async function changePassword(oldPassword, newPassword) {
      if (!loginState) {
        throw new Error('You are not logged in.');
      }

      const body = new URLSearchParams({
        action: 'changePw',
        class: loginState.classCode,
        id: loginState.studentId,
        oldPw: oldPassword,
        newPw: newPassword
      });

      // Do not add custom headers here. URLSearchParams gives the same simple POST
      // pattern used in the older working viewer.
      return requestJson(GAS_ENDPOINT, {
        method: 'POST',
        body: body
      });
    }

    /* ───────────────────────── RENDER HELPERS ───────────────────────── */

    function renderSummaryCard(label, value, cssClass = '', sub = '') {
      return `
        <div class="summary-card ${escapeHtml(cssClass)}">
          <span class="summary-label">${escapeHtml(label)}</span>
          <span class="summary-main">${escapeHtml(value)}</span>
          ${sub ? `<span class="summary-sub">${escapeHtml(sub)}</span>` : ''}
        </div>
      `;
    }

    function renderGradeHero(data) {
      const standing = data.currentStanding || {};
      const letter = standing.letter || '—';
      const percent = formatPercent(standing.percent);
      const fraction = `${formatScore(standing.earned)} / ${formatScore(standing.available)}`;

      return `
        <section class="grade-hero" aria-label=" standing summary">
          <div>
            <div class="grade-hero-label">Current Points</div>
            <div class="grade-hero-score">${fraction}</div>
            <div class="grade-hero-sub">
              ${escapeHtml(percent)} based on current possible points.
            </div>
          </div>
          <div>
            <div class="grade-hero-label">Current Letter Grade</div>
            <div class="grade-hero-letter" style="color: ${gradeColor(letter)};">${escapeHtml(letter)}</div>
          </div>
        </section>
      `;
    }

    function renderSummaryGrid(data) {
      const metrics = data.metrics || {};
      const denominators = data.currentDenominators || {};
      const breakdown = data.currentBreakdown || {};
      const standing = data.currentStanding || {};

      return `
        <section class="summary-grid" aria-label="Grade dashboard cards">
          ${renderSummaryCard(
            'Attendance',
            formatDashboardFraction(breakdown.attendance?.earned ?? metrics.attendanceScore, breakdown.attendance?.available ?? denominators.attendanceCurrent)
          )}
          ${renderSummaryCard(
            'Participation',
            formatDashboardFraction(breakdown.participation?.earned ?? metrics.participationScore, breakdown.participation?.available ?? denominators.participationCurrent)
          )}
          ${renderSummaryCard(
            'Book HW',
            formatDashboardFraction(metrics.bookHomeworkScore, denominators.bookHomeworkCurrent),
            ''
          )}
          ${renderSummaryCard(
            'Writing HW',
            formatDashboardFraction(metrics.writingHomeworkScore, denominators.writingCurrent),
            ''
          )}
          ${renderSummaryCard(
            'Quiz',
            formatDashboardFraction(breakdown.quiz?.earned ?? metrics.quizScore, breakdown.quiz?.available ?? denominators.quizCurrent)
          )}
          ${renderSummaryCard(
            'Midterm Exam',
            formatDashboardFraction(breakdown.midterm?.earned ?? metrics.midtermScore, breakdown.midterm?.available ?? denominators.midtermMax)
          )}
          ${renderSummaryCard(
            'Final Exam',
            formatDashboardFraction(breakdown.final?.earned ?? metrics.finalScore, breakdown.final?.available ?? denominators.finalMax)
          )}
        </section>
      `;
    }

    function renderAttendanceSection(attendance) {
      const dates = Array.isArray(attendance.absenceDates) ? attendance.absenceDates : [];
      const absenceContent = dates.length
        ? `
          <div class="absence-list">
            ${dates.map((date) => `<span class="absence-chip">${escapeHtml(date)}</span>`).join('')}
          </div>
        `
        : '<p class="attendance-note">No recorded absences through today.</p>';

      return `
        <details class="grade-section" open>
          <summary>
            <span>Attendance Through Today</span>
            <span class="section-count">${escapeHtml(formatNumber(attendance.sessionsToDate, 0))} sessions</span>
          </summary>
          <div class="section-body">
            <p class="attendance-note">
              Today used by the script: <strong>${escapeHtml(attendance.today || '—')}</strong><br>
              Attended: <strong>${escapeHtml(formatNumber(attendance.attended, 0))}</strong> ·
              Absent: <strong>${escapeHtml(formatNumber(attendance.absent, 0))}</strong> ·
              Late: <strong>${escapeHtml(formatNumber(attendance.late, 0))}</strong>
            </p>
            ${absenceContent}
          </div>
        </details>
      `;
    }

    function renderBreakdownSection(section, startOpen = true) {
      const items = Array.isArray(section.items) ? section.items : [];
      const openAttribute = startOpen ? ' open' : '';

      return `
        <details class="grade-section"${openAttribute}>
          <summary>
            <span>${escapeHtml(section.title || 'Breakdown')}</span>
            <span class="section-count">${items.length}</span>
          </summary>
          <div class="section-body">
            <ul class="grade-list">
              ${items.map((item) => `
                <li class="grade-item">
                  <span class="grade-label">${escapeHtml(item.label || 'Untitled')}</span>
                  <span class="grade-score">${formatScoreWithMax(item.score, item.max, item.display)}</span>
                </li>
              `).join('')}
            </ul>
          </div>
        </details>
      `;
    }

    function renderGrades(data) {
      const grades = $('grades');
      const sections = Array.isArray(data.sections) ? data.sections : [];

      $('login').style.display = 'none';
      grades.style.display = 'block';

      grades.innerHTML = `
        <div class="student-header">
          <div>
            <h2>Hello, ${escapeHtml(data.name || 'Student')}</h2>
            <p class="student-meta">
              Class <strong>${escapeHtml(data.classCode || '—')}</strong> ·
              ID <strong>${escapeHtml(data.studentId || '—')}</strong><br>
              ${escapeHtml(data.department || '')}${data.year ? ` · Year ${escapeHtml(data.year)}` : ''}
            </p>
          </div>
          <div>
            <button id="backButton" class="back-link" type="button">Return</button><br>
            <button id="openPassword" class="password-link" type="button">Change Password</button>
          </div>
        </div>

        ${renderGradeHero(data)}
        ${renderSummaryGrid(data)}
        ${renderAttendanceSection(data.attendance || {})}

        <hr>

        ${sections.map((section, index) => renderBreakdownSection(section, false)).join('')}
      `;

      $('backButton').addEventListener('click', () => {
        grades.style.display = 'none';
        grades.innerHTML = '';
        $('login').style.display = 'block';
      });

      $('openPassword').addEventListener('click', () => {
        $('overlay').style.display = 'block';
        $('passwordCard').style.display = 'block';
      });
    }

    /* ───────────────────────── EVENT HANDLERS ───────────────────────── */

    $('loginForm').addEventListener('submit', async (event) => {
      event.preventDefault();

      const classCode = $('classSelect').value;
      const studentId = $('studentId').value.trim();
      const password = $('password').value;
      const error = $('loginError');

      error.textContent = 'Checking…';

      try {
        const data = await login(classCode, studentId, password);

        loginState = {
          classCode: classCode,
          studentId: studentId,
          password: password
        };

        error.textContent = '';
        renderGrades(data);

      } catch (err) {
        error.textContent = err.message || String(err);
      }
    });

    $('cancelPassword').addEventListener('click', () => {
      $('overlay').style.display = 'none';
      $('passwordCard').style.display = 'none';
      $('passwordMessage').textContent = '';
      $('passwordForm').reset();
    });

    $('passwordForm').addEventListener('submit', async (event) => {
      event.preventDefault();

      const oldPassword = $('oldPassword').value;
      const newPassword = $('newPassword').value;
      const newPasswordConfirm = $('newPasswordConfirm').value;
      const message = $('passwordMessage');

      if (newPassword !== newPasswordConfirm) {
        message.style.color = '#fb7185';
        message.textContent = 'New passwords do not match.';
        return;
      }

      message.style.color = 'var(--muted)';
      message.textContent = 'Updating…';

      try {
        await changePassword(oldPassword, newPassword);

        if (loginState) {
          loginState.password = newPassword;
        }

        message.style.color = 'var(--accent)';
        message.textContent = 'Password updated.';

        setTimeout(() => {
          $('cancelPassword').click();
        }, 1000);

      } catch (err) {
        message.style.color = '#fb7185';
        message.textContent = err.message || String(err);
      }
    });
  </script>
</body>
</html>
